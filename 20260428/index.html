<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Nanum+Pen+Script&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Playwrite+NO:wght@100..400&display=swap" rel="stylesheet">

    <!-- jqeury 라이브러리 불러오기-->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
    <style>
        *{
            font-family: "Playwrite NO","Noto Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: 700;
            font-style: normal;
            font-variation-settings: "wdth" 100;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>header</h1>
        </div>
        <div class="nav">
            <ul>
                <li><a href="#">home</a></li>
                <li><a href="#">about</a></li>
                <li><a href="#">service</a></li>
                <li><a href="#">contact</a></li>
            </ul>
        </div>
    </div>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .header{ 
            padding: 15px 25px;
            margin: 0 auto; width: 1000px;
            background-color: rgb(200,250,200);
            display: flex; justify-content: space-between;
        }
        .nav ul{
            display: flex;
        }
        .nav ul li{
            list-style: none;
        }
        .nav ul li a {
            color: black;
            padding: 30px 15px;
            text-decoration: none;
            font-size: 25px;
            line-height: 40px; /* 글자 높이를 40px로 하면 글자가 중간으로 옵니다. */
        }
    </style>
    <div class="content">
        <h1>content</h1>
        <section class="main-slider">
            <div class="slider">
                <div class="slide-item item1"><h1>111111</h1></div>
                <div class="slide-item item2"><h1>222222</h1></div>
                <div class="slide-item item3"><h1>333333</h1></div>
            </div>
        </section>
    </div>
    <script>
        $(document).ready(function(){
            $('.slider').slick({
                autoplay: true, // 자동 재생
                autoplaySpeed: 3000, // 3초마다 전환
                dots: true, // 하단 네비게이션 점 표시
                arrows: true, // 좌우 화살표 표시
                infinite: true, // 무한 반복
                fade: true, // 페이드 효과 (선택사항)
                cssEase: 'linear'
            });
        });
    </script>
    <div class="footer">
        <h1>footer</h1>
    </div>
</body>
</html>
