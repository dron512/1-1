<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            /* padding 없이 크기 설정*/
        }

        .main {
            margin: 0 auto;
            /* 중간으로 */
            padding: 20px;
            width: 420px;
            /* 넓이 설정 */
            height: 220px;
            /* 높이 설정 */
            background-color: rgb(220, 220, 220);
            /* 배경색설정 */
        }

        input {
            width: 100%;
            padding: 12px 14px;
            /* border: 1px solid black; */
            border: none;
            border-radius: 5px;
            outline: none;
        }

        input:hover {}

        input:focus {
            /* 투명도 */
            border: 1px solid rgba(20, 20, 220, 0.7);
        }

        button {
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 14px;
            padding: 12px 14px;
            transition: 0.3s;
            background-color: rgba(20, 20, 220, 0.4);
            color: rgb(255, 255, 255);
        }

        /* button:active{} 버튼클릭했을때 상태 선택자 */
        button:hover {
            background: rgba(20, 20, 220, 0.1);
        }
    </style>
</head>

<body>
    <div class="main">
        <h1>생년월일</h1>
        <input type="text" id="birth" value="2001/04/05">
        <button id="check">나이계산</button>
        <div id="print"></div>
    </div>
</body>

</html>
<script>
    const calcu = function () {
        const 생년월일 = document.getElementById('birth').value;
        const birth_year = 생년월일.split('/')[0];

        const date = new Date();
        console.log(date.toDateString());

        const year = new Date().getFullYear();
        console.log(year);

        const ret = year - birth_year + 1;
        console.log(ret);
    }
    document.getElementById('check').onclick = calcu;
</script>
